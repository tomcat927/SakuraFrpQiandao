name: Build and push to GHCR

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (optional)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Determine names and TAG
        run: |
          OWNER_RAW="${GITHUB_REPOSITORY%%/*}"
          REPO_RAW="${GITHUB_REPOSITORY##*/}"
          OWNER=$(echo "$OWNER_RAW" | tr '[:upper:]' '[:lower:]')
          IMAGE=$(echo "$REPO_RAW" | tr '[:upper:]' '[:lower:]')

          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then
            TAG="${GITHUB_SHA::12}"
          fi

          # For manual runs without a tag input, publish a SHA tag but do not create a git tag.
          if [ "$TAG" = "${GITHUB_SHA::12}" ]; then
            echo "NEED_PUSH_GIT_TAG=false" >> $GITHUB_ENV
          else
            # Check if tag exists on remote 'origin'; if missing, mark to push after Docker push
            if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
              echo "NEED_PUSH_GIT_TAG=false" >> $GITHUB_ENV
            else
              echo "NEED_PUSH_GIT_TAG=true" >> $GITHUB_ENV
            fi
          fi

          echo "OWNER=$OWNER" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ env.IMAGE }}:${{ env.TAG }}
            ghcr.io/${{ env.OWNER }}/${{ env.IMAGE }}:latest
          platforms: linux/amd64,linux/arm64

      - name: Create and push git tag (if generated)
        if: ${{ env.NEED_PUSH_GIT_TAG == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Tag created by workflow after successful Docker push" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"
